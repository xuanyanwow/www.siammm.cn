<!DOCTYPE html>
<html>

  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" type="text/css" href="https://www.layuicdn.com/layui/css/layui.css" />
    <title>Siam拼多多录单工具</title>
  </head>

  <body>
      
    <br/><br/><br/>
    
    <div style="padding:20px;">
        <form class="layui-form"  action="result.php" method="post"> <!-- 提示：如果你不想用form，你可以换成div等任何一个普通元素 -->
      
    <div class="layui-form-item layui-form-text">
        <label class="layui-form-label">PDD后台单号</label>
        <div class="layui-input-block">
          <textarea placeholder="请输入内容" class="layui-textarea" name="origin"></textarea>
        </div>
      </div>
      <div class="layui-form-item layui-form-text">
        <label class="layui-form-label">打印记录单号</label>
        <div class="layui-input-block">
          <textarea placeholder="请输入内容" class="layui-textarea" name="print"></textarea>
        </div>
      </div>
      
      
      <div class="layui-form-item">
        <div class="layui-input-block">
          <button class="layui-btn" lay-submit lay-filter="*">立即提交</button>
          <button type="reset" class="layui-btn layui-btn-primary">重置</button>
        </div>
      </div>
  
    </form>
    </div>
    
    
    <script src="https://www.layuicdn.com/layui/layui.js"></script>
    <!--您的Layui代码start-->
    <script type="text/javascript">
    layui.use(['laydate', 'laypage', 'layer', 'table', 'carousel', 'upload', 'element'], function() {
      var laydate = layui.laydate //日期
      ,laypage = layui.laypage //分页
      ,layer = layui.layer //弹层
      ,table = layui.table //表格
      ,carousel = layui.carousel //轮播
      ,upload = layui.upload //上传
      ,element = layui.element; //元素操作 等等...

      /*layer弹出一个示例*/
      layer.msg('Hello World');
    });
    </script>
  </body>

</html>
