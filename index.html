  <div id="app"></div>
  <script>
    // if (typeof navigator.serviceWorker !== 'undefined') {
    //     navigator.serviceWorker.register('sw.js')
    // }
  

    var currentPath = window.location.pathname || '/'
    var hasFileName = /\.[^/]+$/.test(currentPath)
    var basePath = currentPath === '/'
      ? '/'
      : hasFileName
        ? currentPath.replace(/[^/]*$/, '')
        : currentPath.replace(/\/?$/, '/')

    window.$docsify = {
      loadSidebar: true,
      basePath: basePath,
      logo: 'https://picst.sunbangyan.cn/2023/11/17/d6a19bbaff77195b8b3b234f91ea8b81.png',
      name: 'Siam个人中心',
      subMaxLevel: 4,
      beian: {
        ICP: "",
        NISMSP: {
            number: "",
            url: "",
        },
      }
    }
  </script>
